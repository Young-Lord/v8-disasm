name: Build V8 & Disassemble QQ Modules
on: [push, workflow_dispatch]
env:
  V8_TAG: 13.8.258.18

jobs:
  build-and-disasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config git subversion build-essential python3 python-is-python3 ninja-build

      - name: Get depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Fetch V8 source at ${{ env.V8_TAG }}
        run: |
          fetch v8
          cd v8
          git checkout ${{ env.V8_TAG }}
          gclient sync -f
        timeout-minutes: 60

      - name: Apply sanity check patch
        run: |
          cd v8
          git apply ${{ github.workspace }}/patches/sanity_check.patch || true

      - name: Build d8 (release + disassembler + pointer comp)
        run: |
          cd v8
          gn gen out/release --args='is_debug=false v8_enable_disassembler=true v8_enable_object_print=true v8_enable_pointer_compression=true treat_warnings_as_errors=false v8_enable_i18n_support=true'
          ninja -C out/release d8
        timeout-minutes: 120

      - name: Build jsc_disasm tool
        run: |
          g++ -std=c++20 -I v8/include \
            ${{ github.workspace }}/tool/jsc_disasm.cc \
            -o jsc_disasm \
            -L v8/out/release -lv8_monolith -pthread -licui18n -licuuc -licudata
          echo "=== Tool built ==="
          ls -la jsc_disasm

      - name: Disassemble all 795 modules
        run: |
          mkdir -p disasm_output
          ls modules/*.jsc | wc -l
          ./jsc_disasm modules disasm_output

      - name: Upload disassembly results
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-disassembly
          path: disasm_output/
          compression-level: 9
