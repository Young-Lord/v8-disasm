name: Build V8 & Disassemble QQ Modules
on: [push, workflow_dispatch]
env:
  V8_TAG: 13.8.258.18

jobs:
  build-v8:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config git subversion build-essential python3 python-is-python3 ninja-build clang lld

      - uses: actions/cache@v4
        id: cache-depot
        with:
          path: depot_tools
          key: depot-tools

      - name: Get depot_tools
        if: steps.cache-depot.outputs.cache-hit != 'true'
        run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - run: echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - uses: actions/cache@v4
        id: cache-v8
        with:
          path: v8
          key: v8-src-${{ env.V8_TAG }}

      - name: Fetch V8 source at ${{ env.V8_TAG }}
        if: steps.cache-v8.outputs.cache-hit != 'true'
        run: |
          fetch v8
          cd v8
          git checkout ${{ env.V8_TAG }}
          gclient sync -f
        timeout-minutes: 60

      - uses: actions/cache@v4
        id: cache-d8
        with:
          path: v8/out/release
          key: v8-d8-${{ env.V8_TAG }}-${{ runner.arch }}-clang-nocxx-v2

      - name: Patch sanity checks + build
        if: steps.cache-d8.outputs.cache-hit != 'true'
        run: |
          cd v8
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckWithoutSource/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckWithoutSource(\
              uint32_t expected_ro_snapshot_checksum) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckJustSource/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckJustSource(\
              uint32_t expected_source_hash) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheck(/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheck(\
              uint32_t expected_ro_snapshot_checksum,\
              uint32_t expected_source_hash) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          gn gen out/release --args='is_debug=false is_clang=true use_custom_libcxx=false use_sysroot=false clang_use_chrome_plugins=false enable_rust=false treat_warnings_as_errors=false v8_enable_sandbox=false v8_enable_temporal_support=false v8_enable_disassembler=true v8_enable_object_print=true v8_enable_pointer_compression=true v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true'
          ninja -C out/release d8 v8_monolith
        timeout-minutes: 120

      - name: Upload V8 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v8-build
          path: |
            v8/out/release/obj/libv8_monolith.a
            v8/out/release/icudtl.dat
            v8/include/
          retention-days: 1

  link-tool:
    runs-on: ubuntu-22.04
    needs: build-v8
    steps:
      - uses: actions/checkout@v4

      - name: Install clang+lld
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Download V8 build artifacts
        uses: actions/download-artifact@v4
        with:
          name: v8-build
          path: v8

      - name: Build jsc_disasm tool
        run: |
          echo "=== libv8_monolith.a size ==="
          ls -lh v8/out/release/obj/libv8_monolith.a
          echo "=== icudtl.dat ==="
          ls -lh v8/out/release/icudtl.dat
          clang++ -std=c++20 -I v8/include \
            -DV8_COMPRESS_POINTERS \
            -DV8_COMPRESS_POINTERS_IN_SHARED_CAGE \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -DV8_ARRAY_BUFFER_INTERNAL_FIELD_COUNT=0 \
            -DV8_ARRAY_BUFFER_VIEW_INTERNAL_FIELD_COUNT=0 \
            -DV8_PROMISE_INTERNAL_FIELD_COUNT=0 \
            tool/jsc_disasm.cc \
            -o jsc_disasm \
            -fno-rtti -fuse-ld=lld \
            -Wl,--start-group v8/out/release/obj/libv8_monolith.a -Wl,--end-group \
            -ldl -lrt -pthread
          echo "=== Tool built ==="
          ls -lh jsc_disasm

      - name: Quick smoke test
        run: |
          cp v8/out/release/icudtl.dat .
          timeout 10 ./jsc_disasm 2>&1 || true
          echo "=== Smoke test exit code: $? ==="

      - name: Upload tool binary + icudtl.dat
        uses: actions/upload-artifact@v4
        with:
          name: jsc-disasm-tool
          path: |
            jsc_disasm
            icudtl.dat
          retention-days: 1

  disasm:
    runs-on: ubuntu-22.04
    needs: link-tool
    steps:
      - uses: actions/checkout@v4

      - name: Download jsc_disasm tool
        uses: actions/download-artifact@v4
        with:
          name: jsc-disasm-tool

      - name: Disassemble all 795 modules
        run: |
          chmod +x jsc_disasm
          mkdir -p disasm_output
          ls modules/*.jsc | wc -l
          ./jsc_disasm modules disasm_output

      - name: Upload disassembly results
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-disassembly
          path: disasm_output/
          compression-level: 9
