name: Build V8 & Disassemble QQ Modules
on: [push, workflow_dispatch]
env:
  V8_TAG: 13.8.258.18

jobs:
  build-v8:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config git subversion build-essential python3 python-is-python3 ninja-build

      - uses: actions/cache@v4
        id: cache-depot
        with:
          path: depot_tools
          key: depot-tools

      - name: Get depot_tools
        if: steps.cache-depot.outputs.cache-hit != 'true'
        run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - run: echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - uses: actions/cache@v4
        id: cache-v8
        with:
          path: v8
          key: v8-src-${{ env.V8_TAG }}

      - name: Fetch V8 source at ${{ env.V8_TAG }}
        if: steps.cache-v8.outputs.cache-hit != 'true'
        run: |
          fetch v8
          cd v8
          git checkout ${{ env.V8_TAG }}
          gclient sync -f
        timeout-minutes: 60

      - uses: actions/cache@v4
        id: cache-d8
        with:
          path: v8/out/release
          key: v8-d8-${{ env.V8_TAG }}-${{ runner.arch }}-gcc-v1

      - name: Patch sanity checks + build
        if: steps.cache-d8.outputs.cache-hit != 'true'
        run: |
          cd v8
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckWithoutSource/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckWithoutSource(\
              uint32_t expected_ro_snapshot_checksum) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckJustSource/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheckJustSource(\
              uint32_t expected_source_hash) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          sed -i '/SerializedCodeSanityCheckResult SerializedCodeData::SanityCheck(/,/^}/c\
          SerializedCodeSanityCheckResult SerializedCodeData::SanityCheck(\
              uint32_t expected_ro_snapshot_checksum,\
              uint32_t expected_source_hash) const {\
            return SerializedCodeSanityCheckResult::kSuccess;\
          }' src/snapshot/code-serializer.cc
          gn gen out/release --args='is_debug=false is_clang=false use_custom_libcxx=false enable_rust=false v8_enable_sandbox=false v8_enable_temporal_support=false v8_enable_disassembler=true v8_enable_object_print=true v8_enable_pointer_compression=true v8_monolithic=true v8_use_external_startup_data=false treat_warnings_as_errors=false v8_enable_i18n_support=true'
          ninja -C out/release d8 v8_monolith
        timeout-minutes: 120

      - name: Upload V8 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v8-build
          path: |
            v8/out/release/obj/libv8_monolith.a
            v8/out/release/obj/libv8_libbase.a
            v8/out/release/obj/libv8_libplatform.a
            v8/include/
          retention-days: 1

  disasm:
    runs-on: ubuntu-22.04
    needs: build-v8
    steps:
      - uses: actions/checkout@v4

      - name: Download V8 build artifacts
        uses: actions/download-artifact@v4
        with:
          name: v8-build
          path: v8

      - name: Build jsc_disasm tool
        run: |
          g++ -std=c++20 -I v8/include \
            tool/jsc_disasm.cc \
            -o jsc_disasm \
            v8/out/release/obj/libv8_monolith.a \
            v8/out/release/obj/libv8_libbase.a \
            v8/out/release/obj/libv8_libplatform.a \
            -pthread
          echo "=== Tool built ==="
          ls -la jsc_disasm

      - name: Disassemble all 795 modules
        run: |
          mkdir -p disasm_output
          ls modules/*.jsc | wc -l
          ./jsc_disasm modules disasm_output

      - name: Upload disassembly results
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-disassembly
          path: disasm_output/
          compression-level: 9
