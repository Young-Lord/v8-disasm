name: Build V8 Disassembler

on: [push, workflow_dispatch]

env:
  V8_TAG: 13.8.258.18

jobs:
  # Job 1: Fetch V8 source

jobs:
  fetch-v8:
  runs-on: ubuntu-22.04
  outputs:
    cache-key: ${{ steps.cache-v8-out.outputs.cache-hit }}
  steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y pkg-config git subversion curl wget build-essential python3 python-is-python3 xz-utils ninja-build
    - uses: actions/cache@v4
      id: cache-depot
      with:
        path: depot_tools
        key: depot-tools-${{ runner.os }}
    - name: Get depot_tools
      if: steps.cache-depot.outputs.cache-hit != 'true'
      run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
      timeout-minutes: 30
    - name: Setup PATH
      run: echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
    - uses: actions/cache@v4
      id: cache-v8
      with:
        path: v8
        key: v8-src-13.8.258.18-${{ runner.os }}
    - name: Fetch V8
      if: steps.cache-v8.outputs.cache-hit != 'true'
      run: |
        fetch v8
        cd v8
        git checkout 13.8.258.18
        gclient sync -f
      timeout-minutes: 60

# Job 2: Build d8 (depends on fetch-v8)
build-v8:
  needs: fetch-v8
  runs-on: ubuntu-22.04
  steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y pkg-config git subversion build-essential python3 python-is-python3 ninja-build
    - uses: actions/cache@v4
      with:
        path: depot_tools
        key: depot-tools-${{ runner.os }}
    - name: Setup PATH
      run: echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
    - uses: actions/cache@v4
      with:
        path: v8
        key: v8-src-13.8.258.18-${{ runner.os }}
    - uses: actions/cache@v4
      id: cache-d8
      with:
        path: v8/out/release
        key: v8-d8-13.8.258.18-${{ runner.os }}
    - name: Apply patch
      run: |
        cd v8
        git apply ${{ github.workspace }}/patches/sanity_check.patch || true
    - name: Build d8
      if: steps.cache-d8.outputs.cache-hit != 'true'
      run: |
        cd v8
        gn gen out/release --args='is_debug=false v8_enable_disassembler=true v8_enable_object_print=true v8_enable_pointer_compression=true treat_warnings_as_errors=false v8_enable_i18n_support=true'
        ninja -C out/release d8
      timeout-minutes: 120
    - name: Upload d8 artifact
      uses: actions/upload-artifact@v4
      with:
        name: v8-d8-bin
        path: v8/out/release/d8

# Job 3: Build tool + results (depends on build-v8)
build-tool:
  needs: build-v8
  runs-on: ubuntu-22.04
  steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: v8
        key: v8-src-13.8.258.18-${{ runner.os }}
    - uses: actions/cache@v4
      with:
        path: v8/out/release
        key: v8-d8-13.8.258.18-${{ runner.os }}
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential python3 ninja-build
    - name: Build jsc_disasm
      run: |
        g++ -std=c++20 -I v8/include \
          ${{ github.workspace }}/tool/jsc_disasm.cc \
          -o jsc_disasm \
          -L v8/out/release -lv8_monolith -pthread -licui18n -licuuc -licudata
    - name: Package tools
      run: |
        mkdir -p dist
        cp v8/out/release/d8 dist/
        cp v8/out/release/icudtl.dat dist/
        cp jsc_disasm dist/
    - uses: actions/upload-artifact@v4
      with:
        name: v8-disasm-tools
        path: dist/
